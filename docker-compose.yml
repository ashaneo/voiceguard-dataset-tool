version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER:     voiceguard
      POSTGRES_PASSWORD: voiceguard
      POSTGRES_DB:       voiceguard
    volumes:
      - pg_data:/var/lib/postgresql/data
    # No ports exposed — db is only reachable by app on the internal network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voiceguard"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: ./backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://voiceguard:voiceguard@db:5432/voiceguard
      SECRET_KEY:   bc897c2d9d1a1807913d4203ebcca07a4daf31050305cfd68d9982d16f39e494
      UPLOAD_DIR:   /uploads
    volumes:
      - ./uploads:/uploads
      - ./frontend:/frontend:ro
      - ./scripts_store:/scripts_store
    # No ports exposed — only nginx can reach the app on the internal network

  nginx:
    image: nginx:alpine
    restart: always
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  pg_data:
